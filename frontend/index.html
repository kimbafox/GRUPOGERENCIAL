<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merkateck</title>
    <link rel="stylesheet" href="css/basico.css">
</head>
<body>

<header>
    <div class="brand-wrap">
        <img id="brandLogo" class="brand-logo" src="assets/M.png" alt="Logo de Merkateck">
        <div class="brand-copy">
            <h1>Merkateck</h1>
            <p>Catálogo digital</p>
        </div>
    </div>
    <div class="admin-inline-actions">
    
        <button class="btn-acceso" onclick="mostrarLogin()">Ingresar al panel</button>
    </div>
</header>

<main>


    <section class="promo-carousel">
        <div class="carousel-header">
            <h3>Descubre nuestras mejores opciones</h3>
        </div>

        <div class="carousel-wrapper">
            <button class="carousel-control prev" type="button" aria-label="Imagen anterior">&#10094;</button>

            <div class="carousel-viewport">
                <div class="carousel-track" id="promoTrack">
                    <article class="carousel-slide active">
                        <img src="assets/ALGUN%20DIA.png" alt="Promoción Algún Día">
                    </article>

                    <article class="carousel-slide">
                        <img src="assets/CUENTA.png" alt="Promoción Cuenta">
                    </article>

                    <article class="carousel-slide">
                        <img src="assets/QUIENES.png" alt="Promoción Quiénes Somos">
                    </article>

                    <article class="carousel-slide">
                        <img src="assets/TU%20MEJOR%20OPCIONES.png" alt="Promoción Tu Mejor Opciones">
                    </article>
                </div>
            </div>

            <div class="carousel-side-nav">
                <button class="carousel-dot active" type="button" aria-label="Ir a la imagen 1">1</button>
                <button class="carousel-dot" type="button" aria-label="Ir a la imagen 2">2</button>
                <button class="carousel-dot" type="button" aria-label="Ir a la imagen 3">3</button>
                <button class="carousel-dot" type="button" aria-label="Ir a la imagen 4">4</button>
            </div>

            <button class="carousel-control next" type="button" aria-label="Imagen siguiente">&#10095;</button>
        </div>
    </section>

    <section id="catalogo" class="catalog-section">
        <div class="section-heading">
            <h3>Catálogo</h3>
        </div>
        <div class="catalog-filters">
            <input type="text" id="filtro-busqueda" placeholder="Buscar producto">
            <select id="filtro-categoria">
                <option value="todas">Todas las categorías</option>
            </select>
        </div>
        <div id="catalogo-grid" class="catalog-grid">
            <p class="catalog-loading">Cargando categorías de venta...</p>
        </div>
    </section>

    <section id="ventajas" class="section-shell benefits-section">
        <div class="section-heading section-heading-wide">
        </div>
    </section>

    <section id="login" class="modal oculto">
        <div class="modal-content">
            <h2>Iniciar sesión</h2>
            <input type="email" id="correo" placeholder="kimba@coso.com" required>
            <input type="password" id="password" placeholder="KIMBAMIPAPI" required>

            <button onclick="login()">Ingresar</button>
            <button onclick="cerrarLogin()">Cancelar</button>
        </div>
    </section>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/kimbin.js"></script>
</body>
</html>
