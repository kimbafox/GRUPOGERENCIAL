<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="stylesheet" href="css/basico.css">
</head>
<body>

<header>
    <h1>coso d egerenciales</h1>
    <div>
        <button onclick="mostrarLogin()">Login</button>
    </div>
</header>

<main>
    <section>
        <h2>Panel Público</h2>
        <p>Contenido visible para todos.</p>
        
    </section>

    <section id="login" class="modal oculto">
        <div class="modal-content">
            <h2>Iniciar sesión</h2>
            <input type="email" id="correo" placeholder="nombre@coso.com" pattern="[a-zA-Z]+@coso\.com" required>
            <input type="password" id="password" placeholder="kimbamipapi" required>

            <button onclick="login()">Ingresar</button>
            <button onclick="cerrarLogin()">Cancelar</button>
        </div>
    </section>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/kimbin.js"></script>
</body>
</html>
