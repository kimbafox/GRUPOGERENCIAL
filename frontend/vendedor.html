<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendedor</title>
    <link rel="stylesheet" href="css/basico.css">
</head>
<body data-panel="vendor">
<header>
    <div class="brand-copy">
        <h1>Panel Vendedor</h1>
    </div>
    <div class="admin-inline-actions">
        <button type="button" onclick="window.location.href='index.html'">Ver tienda</button>
        <button type="button" onclick="logout()">Cerrar sesión</button>
    </div>
</header>

<main>
    <section class="info-panel">
        <h2>Vendedor</h2>
        <p id="usuario-info"></p>
    </section>

    <section class="metrics-panel">
        <h2>Resumen</h2>
        <div class="metric-cards">
            <article class="metric-card">
                <span>Mis productos</span>
                <strong id="metric-total-productos">0</strong>
            </article>
            <article class="metric-card">
                <span>Mis compras</span>
                <strong id="metric-compras-totales">0</strong>
            </article>
            <article class="metric-card">
                <span>Más comprado</span>
                <strong id="metric-producto-top">Sin datos</strong>
            </article>
        </div>

        <div class="chart-panel">
            <h3>Compras por día</h3>
            <div id="ventasChart" class="chart-bars"></div>
            <p id="ventasResumen" class="chart-summary"></p>
        </div>
    </section>

    <section class="product-upload-section">
        <div class="upload-header">
            <h2>Mis productos</h2>
            <button id="toggle-producto-btn" type="button" onclick="toggleProductoPanel()">Abrir carga</button>
        </div>

        <div id="panel-productos" class="product-panel-shell oculto">
            <div class="form-preview-grid">
                <div class="form-side">
                    <input type="hidden" id="producto-id">

                    <div class="admin-grid">
                        <div class="field-group">
                            <label for="producto-nombre">Nombre</label>
                            <input type="text" id="producto-nombre" placeholder="Nombre del producto">
                        </div>

                        <div class="field-group">
                            <label for="producto-categoria">Categoría</label>
                            <input type="text" id="producto-categoria" placeholder="Categoría">
                        </div>

                        <div class="field-group">
                            <label for="producto-precio">Precio (Bs)</label>
                            <input type="number" id="producto-precio" placeholder="Precio">
                        </div>

                        <div class="field-group">
                            <label for="producto-stock">Stock</label>
                            <input type="number" id="producto-stock" placeholder="Stock">
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="producto-imagen">Imagen</label>
                        <input type="text" id="producto-imagen" placeholder="Ruta o URL">
                    </div>

                    <div class="field-group">
                        <label for="producto-descripcion">Descripción</label>
                        <textarea id="producto-descripcion" rows="5" placeholder="Descripción"></textarea>
                    </div>
                </div>

                <aside class="preview-side">
                    <h3>Vista previa</h3>
                    <article class="product-preview-card">
                        <img id="preview-imagen" class="preview-image" src="assets/M.png" alt="Vista previa del producto">
                        <div class="preview-meta">
                            <span id="preview-categoria" class="catalog-category">Categoría</span>
                            <h4 id="preview-nombre">Nombre del producto</h4>
                            <p id="preview-descripcion">Sin resumen.</p>
                            <strong id="preview-precio" class="preview-price">Bs 0</strong>
                            <small id="preview-stock" class="preview-stock-pill">Stock: 0</small>
                        </div>
                    </article>
                </aside>
            </div>

            <div class="admin-inline-actions">
                <button type="button" onclick="guardarProductoAdmin()">Guardar producto</button>
                <button type="button" onclick="resetProductoForm()">Limpiar formulario</button>
            </div>
            <p id="productos-estado"></p>

            <div class="tabla-wrap">
                <table class="tabla-usuarios">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Stock</th>
                            <th>Comprado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="productos-body">
                        <tr><td colspan="5">Cargando productos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
initVendedorPanel();
</script>
</body>
</html>
