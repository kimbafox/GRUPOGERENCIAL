<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Panel dueno</title>
	<link rel="stylesheet" href="css/styles.css">
</head>
<body class="owner-page">
	<main class="owner-shell">
		<div id="pedido-banner" class="top-banner hidden" aria-live="polite"></div>

		<section class="owner-header card">
			<div>
				<p class="eyebrow">Administracion</p>
				<h1>Control del restaurante</h1>
				<p class="hint-text">Gestiona menu, mesas, pedidos y notificaciones en un solo panel.</p>
			</div>
			<a href="index.html" class="ghost-link inline-link">Volver al acceso</a>
		</section>

		<section class="owner-grid">
			<div class="card owner-section">
				<div class="section-head">
					<div>
						<p class="eyebrow">Menu</p>
						<h2>Productos</h2>
					</div>
				</div>
				<form id="menu-form" class="stack-form">
					<input type="hidden" id="producto-id">
					<input id="producto-nombre" placeholder="Nombre del producto" required>
					<input id="producto-precio" type="number" min="0" step="0.01" placeholder="Precio en Bs" required>
					<input id="producto-imagen" placeholder="URL de imagen o ruta local">
					<label class="checkbox-row">
						<input id="producto-disponible" type="checkbox" checked>
						Disponible
					</label>
					<div class="form-actions">
						<button type="submit">Guardar producto</button>
						<button id="menu-reset" type="button" class="secondary-btn">Limpiar</button>
					</div>
				</form>
				<div id="menu-admin" class="admin-list"></div>
			</div>

			<div class="card owner-section">
				<div class="section-head">
					<div>
						<p class="eyebrow">Mesas</p>
						<h2>Accesos QR</h2>
					</div>
				</div>
				<form id="mesa-form" class="stack-form">
					<input id="mesa-nombre" placeholder="Nombre visible de la mesa" required>
					<button type="submit">Crear mesa</button>
				</form>
				<div id="mesas" class="admin-list"></div>
			</div>

			<div class="card owner-section">
				<div class="section-head">
					<div>
						<p class="eyebrow">QR visibles</p>
						<h2>Imagenes de mesas</h2>
					</div>
					<button id="toggle-qr-btn" type="button" class="secondary-btn section-toggle" aria-expanded="false" aria-controls="qr-galeria-wrap">Mostrar QR</button>
				</div>
				<div id="qr-galeria-wrap" class="qr-collapse hidden">
					<div id="qr-galeria" class="qr-gallery"></div>
				</div>
			</div>

			<div class="card owner-section wide-section">
				<div class="section-head">
					<div>
						<p class="eyebrow">Pedidos</p>
						<h2>Cola operativa</h2>
					</div>
				</div>
				<div id="pedidos" class="orders-board"></div>
			</div>

			<div class="card owner-section">
				<div class="section-head">
					<div>
						<p class="eyebrow">Notificaciones</p>
						<h2>Nuevos ingresos</h2>
					</div>
				</div>
				<div id="notificaciones" class="notification-list"></div>
			</div>
		</section>
	</main>

	<script src="js/dueno.js"></script>
</body>
</html>
