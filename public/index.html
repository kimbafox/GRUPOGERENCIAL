<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurante App</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="landing-page">
  <main class="landing-shell">
    <section class="hero-card">
      <div class="hero-brand">
        <img src="img/logo.png" alt="Logo restaurante" class="hero-logo">
        <p class="eyebrow">Pedido digital para restaurante</p>
        <h1>Haz tu pedido desde la mesa sin esperar a un mesero.</h1>
        <p class="hero-copy">
          Ingresa el codigo de tu mesa o usa el escaner QR para entrar directo al menu.
        </p>
      </div>

      <div class="access-panel">
        <label for="codigo">Codigo de mesa</label>
        <input placeholder="Ej. A1B2C3" id="codigo" maxlength="12">
        <button id="entrar-btn" type="button" data-help-text="Abre el menu de tu mesa con el codigo escrito.">Entrar al menu</button>
        <button id="scan-btn" type="button" class="secondary-btn" data-help-text="Enciende tu camara para leer el QR de la mesa.">Escanear QR</button>
        <p id="scan-status" class="hint-text"></p>
        <button id="dueno-btn" type="button" class="ghost-link" data-help-text="Lleva al panel del dueno para administrar el restaurante.">Acceso dueno</button>
      </div>
    </section>

    <section id="scanner" class="scanner-card hidden">
      <div id="scanner-reader" class="scanner-reader"></div>
      <div class="scanner-actions">
        <span>Apunta la camara al codigo QR de la mesa.</span>
        <button id="close-scan" type="button" class="secondary-btn">Cerrar escaner</button>
      </div>
    </section>
  </main>

  <button id="help-toggle" class="help-fab" type="button" aria-pressed="false">Ayuda</button>
  <div id="help-overlay" class="help-overlay hidden" aria-hidden="true"></div>

  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script src="js/main.js"></script>
</body>
</html>
