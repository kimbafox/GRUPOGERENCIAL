<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Menu digital</title>
	<link rel="stylesheet" href="css/styles.css">
</head>
<body class="client-page">
	<main class="client-shell">
		<section class="client-header card">
			<div>
				<p class="eyebrow">Mesa activa</p>
				<h1 id="mesa-titulo">Cargando mesa...</h1>
				<p id="mesa-subtitulo" class="hint-text"></p>
			</div>
			<a href="index.html" class="ghost-link inline-link">Cambiar mesa</a>
		</section>

		<section class="client-content">
			<div class="card menu-panel">
				<div class="section-head">
					<div>
						<p class="eyebrow">Menu</p>
						<h2>Productos disponibles</h2>
					</div>
				</div>
				<div id="menu" class="menu-grid"></div>
			</div>

			<aside class="card cart-panel">
				<div class="section-head">
					<div>
						<p class="eyebrow">Carrito</p>
						<h2>Tu pedido</h2>
					</div>
				</div>
				<div id="carrito" class="cart-list"></div>
				<div class="cart-summary">
					<strong>Total</strong>
					<strong id="total">Bs 0.00</strong>
				</div>
				<button id="pedir-btn" type="button">Confirmar pedido</button>
				<p id="pedido-status" class="hint-text"></p>
			</aside>
		</section>
	</main>

	<script src="js/cliente.js"></script>
</body>
</html>
